{% extends 'blog/base.html' %}

{% block content %}

{% for post in posts %}

    <a href="{% url 'details' post.id %}">
        <h1>{{ post.title|upper }}</h1>
    </a>

    <p>{{ post.content|truncatewords:10 }}</p>

    <p>{{ post.created_at|date:'d M Y H:i' }}</p>

    <p>{{ post.updated_at|date:'d M Y H:i' }}</p>

{% endfor %}

{% endblock %}
