<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>

    <nav>

        <a href="{% url 'home' %}">Home</a>

        <a href="{% url 'create_post' %}">Create Post</a>

        {% if user.is_authenticated %}

            <p>Welcome {{ user.username }}</p>

            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>

        {% else %}

            <a href="{% url 'login' %}">Login</a>

        {% endif %}

    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
