{% extends 'blog/base.html' %}

{% block content %}

<h1>{{ post.title }}</h1>

<p>{{ post.content }}</p>

<p>{{ post.created_at|date:'d M Y H:i' }}</p>

<p>{{ post.updated_at|date:'d M Y H:i' }}</p>

{% if request.user == post.author %}

    <a href="{% url 'update_post' post.id %}">Update</a>

    <a href="{% url 'delete_post' post.id %}">Delete</a>

{% endif %}

{% endblock %}
